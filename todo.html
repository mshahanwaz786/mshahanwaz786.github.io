<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List | Md Shahnawaz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --blue: #1A56DB; --dark: #111827; --gray: #6B7280; --light: #F3F4F6; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #EFF6FF, #DBEAFE); min-height: 100vh; padding: 20px; }

    .app {
      max-width: 550px; margin: 0 auto;
      background: #fff; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(26,86,219,0.15); overflow: hidden;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #1A56DB, #3B82F6);
      padding: 30px 28px 24px; color: #fff;
    }
    .header h1 { font-size: 26px; font-weight: 900; margin-bottom: 4px; }
    .header p { font-size: 13px; opacity: 0.85; margin-bottom: 20px; }
    .stats { display: flex; gap: 16px; }
    .stat {
      background: rgba(255,255,255,0.15); border-radius: 10px;
      padding: 10px 16px; text-align: center; flex: 1;
    }
    .stat-num { font-size: 22px; font-weight: 900; }
    .stat-label { font-size: 11px; opacity: 0.85; }

    /* INPUT */
    .input-area { padding: 20px 24px; border-bottom: 1px solid #F3F4F6; }
    .input-row { display: flex; gap: 10px; }
    .input-row input {
      flex: 1; padding: 12px 16px; border: 2px solid #E5E7EB;
      border-radius: 10px; font-size: 14px; outline: none;
      transition: border 0.2s; font-family: inherit;
    }
    .input-row input:focus { border-color: var(--blue); }
    .add-btn {
      background: var(--blue); color: #fff; border: none;
      border-radius: 10px; padding: 12px 20px; font-size: 22px;
      cursor: pointer; transition: all 0.2s; font-weight: 700;
    }
    .add-btn:hover { background: #1440a8; transform: scale(1.05); }

    /* FILTERS */
    .filters { display: flex; gap: 8px; padding: 16px 24px; border-bottom: 1px solid #F3F4F6; }
    .filter-btn {
      padding: 7px 16px; border-radius: 20px; border: 2px solid #E5E7EB;
      background: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
      color: var(--gray); transition: all 0.2s; font-family: inherit;
    }
    .filter-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* TASKS */
    .tasks { padding: 16px 24px; min-height: 200px; max-height: 380px; overflow-y: auto; }
    .empty {
      text-align: center; padding: 50px 20px; color: var(--gray);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    .task {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 12px; margin-bottom: 10px;
      background: var(--light); transition: all 0.2s; animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .task:hover { background: #EFF6FF; }
    .task.done { opacity: 0.6; }

    .check-btn {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid #D1D5DB; background: #fff;
      cursor: pointer; flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 13px;
    }
    .check-btn.checked { background: #10B981; border-color: #10B981; color: #fff; }

    .task-text { flex: 1; font-size: 14px; color: var(--dark); word-break: break-word; }
    .task-text.done-text { text-decoration: line-through; color: var(--gray); }

    .task-input {
      flex: 1; border: none; background: transparent;
      font-size: 14px; color: var(--dark); outline: none;
      font-family: inherit;
    }

    .action-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .action-btn {
      width: 30px; height: 30px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 14px; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .edit-btn { background: #EFF6FF; color: var(--blue); }
    .edit-btn:hover { background: var(--blue); color: #fff; }
    .save-btn { background: #D1FAE5; color: #065F46; }
    .save-btn:hover { background: #10B981; color: #fff; }
    .del-btn { background: #FEE2E2; color: #DC2626; }
    .del-btn:hover { background: #DC2626; color: #fff; }

    /* FOOTER */
    .app-footer {
      padding: 14px 24px; background: var(--light);
      display: flex; justify-content: space-between; align-items: center;
    }
    .app-footer span { font-size: 12px; color: var(--gray); }
    .clear-btn {
      font-size: 12px; color: #DC2626; background: none; border: none;
      cursor: pointer; font-weight: 600; font-family: inherit;
    }
    .clear-btn:hover { text-decoration: underline; }

    .credit { text-align: center; padding: 12px; font-size: 11px; color: var(--gray); }
    .credit a { color: var(--blue); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>✅ To-Do List</h1>
      <p>Stay productive — manage your tasks</p>
      <div class="stats">
        <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-num" id="activeCount">0</div><div class="stat-label">Active</div></div>
        <div class="stat"><div class="stat-num" id="doneCount">0</div><div class="stat-label">Done</div></div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addTask()"/>
        <button class="add-btn" onclick="addTask()">+</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <div class="tasks" id="taskList"></div>

    <div class="app-footer">
      <span id="footerText">No tasks yet</span>
      <button class="clear-btn" onclick="clearDone()">Clear Done</button>
    </div>
  </div>
  <div class="credit">Built by <a href="https://mshahanwaz786.github.io">Md Shahnawaz</a></div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';
    let editingId = null;

    function save() { localStorage.setItem('tasks', JSON.stringify(tasks)); }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save(); render();
    }

    function toggleDone(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save(); render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }

    function startEdit(id) {
      editingId = id; render();
      setTimeout(() => { const el = document.getElementById('edit-' + id); if (el) { el.focus(); el.select(); } }, 50);
    }

    function saveEdit(id) {
      const el = document.getElementById('edit-' + id);
      if (el) {
        const val = el.value.trim();
        if (val) tasks = tasks.map(t => t.id === id ? { ...t, text: val } : t);
      }
      editingId = null; save(); render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    }

    function render() {
      const list = document.getElementById('taskList');
      const filtered = tasks.filter(t => filter === 'all' ? true : filter === 'done' ? t.done : !t.done);
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      const active = total - done;

      document.getElementById('totalCount').textContent = total;
      document.getElementById('activeCount').textContent = active;
      document.getElementById('doneCount').textContent = done;
      document.getElementById('footerText').textContent = total === 0 ? 'No tasks yet' : `${active} task${active !== 1 ? 's' : ''} remaining`;

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">${filter === 'done' ? '🎉' : '📝'}</div><p>${filter === 'done' ? 'No completed tasks yet!' : filter === 'active' ? 'All tasks done! 🎉' : 'Add your first task above!'}</p></div>`;
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="task ${t.done ? 'done' : ''}">
          <button class="check-btn ${t.done ? 'checked' : ''}" onclick="toggleDone(${t.id})">${t.done ? '✓' : ''}</button>
          ${editingId === t.id
            ? `<input class="task-input" id="edit-${t.id}" value="${t.text.replace(/"/g, '&quot;')}" onkeydown="if(event.key==='Enter') saveEdit(${t.id})" onblur="saveEdit(${t.id})"/>`
            : `<span class="task-text ${t.done ? 'done-text' : ''}">${t.text}</span>`
          }
          <div class="action-btns">
            ${editingId === t.id
              ? `<button class="action-btn save-btn" onclick="saveEdit(${t.id})">💾</button>`
              : `<button class="action-btn edit-btn" onclick="startEdit(${t.id})">✏️</button>`
            }
            <button class="action-btn del-btn" onclick="deleteTask(${t.id})">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    render();
  </script>
</body>
</html>
